<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crash Engine Preview</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #06090c;
            overflow: hidden;
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            color: white;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #game-container {
            position: relative;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }
        #bg-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.3;
            z-index: 0;
        }
        .grid-overlay {
            position: absolute;
            inset: 0;
            background: 
                linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
            background-size: 50px 50px;
            pointer-events: none;
            z-index: 1;
        }
        #canvas-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            z-index: 2;
        }
        canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #multiplier-display {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            text-align: center;
            pointer-events: none;
        }
        #multiplier-value {
            font-size: 5rem;
            font-weight: 900;
            letter-spacing: -0.02em;
            transition: color 0.2s;
            text-shadow: 0 0 40px currentColor;
        }
        #multiplier-label {
            font-size: 1rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3em;
            margin-top: 4px;
            opacity: 0.8;
        }
        .idle-state #multiplier-value {
            color: rgba(255,255,255,0.15);
            text-shadow: none;
        }
        .idle-state #multiplier-label {
            color: rgba(255,255,255,0.3);
        }
        .playing-state #multiplier-value {
            color: #22c55e;
        }
        .playing-state #multiplier-label {
            color: #22c55e;
        }
        .crashed-state #multiplier-value {
            color: #ef4444;
            animation: shake 0.5s ease-out;
        }
        .crashed-state #multiplier-label {
            color: #ef4444;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            20% { transform: translateX(-8px); }
            40% { transform: translateX(8px); }
            60% { transform: translateX(-4px); }
            80% { transform: translateX(4px); }
        }
        #game-name {
            position: absolute;
            top: 12px;
            left: 16px;
            z-index: 10;
            font-size: 0.75rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            color: rgba(255,255,255,0.3);
        }
        #status-badge {
            position: absolute;
            top: 12px;
            right: 16px;
            z-index: 10;
            font-size: 0.6rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            padding: 4px 12px;
            border-radius: 100px;
            display: none;
        }
        .crashed-state #status-badge {
            display: block;
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>
    <div id="game-container" class="idle-state">
        <img id="bg-image" style="display:none" />
        <div class="grid-overlay"></div>
        <div id="canvas-wrap">
            <canvas id="graph"></canvas>
        </div>
        <div id="multiplier-display">
            <div id="multiplier-value">1.00x</div>
            <div id="multiplier-label">Waiting...</div>
        </div>
        <div id="game-name">CRASH PREVIEW</div>
        <div id="status-badge">CRASHED</div>
    </div>

    <script>
    (function() {
        // ─── Config ────────────────────────────────────────────────
        let config = {
            flyingObject: '🚀',
            crashImage: null,
            backgroundImage: null,
            accentColor: '#22c55e',
            backgroundColor: '#06090c',
            graphColor: '#22c55e',
            maxMultiplier: 1000,
            houseEdge: 5,
            accelerationCurve: 0.08,
            theme: {
                gameName: 'CRASH PREVIEW',
                gameDescription: ''
            }
        };

        const canvas = document.getElementById('graph');
        const ctx = canvas.getContext('2d');
        const container = document.getElementById('game-container');
        const multValue = document.getElementById('multiplier-value');
        const multLabel = document.getElementById('multiplier-label');
        const gameNameEl = document.getElementById('game-name');
        const bgImage = document.getElementById('bg-image');

        let flyingObjectImg = null;
        let crashImageObj = null;

        let state = 'IDLE'; // IDLE, PLAYING, CRASHED
        let multiplier = 1.00;
        let crashPoint = 1.00;
        let timeStart = 0;
        let animFrame = null;

        // ─── Resize canvas ────────────────────────────────────────
        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width * window.devicePixelRatio;
            canvas.height = rect.height * window.devicePixelRatio;
            ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
            canvas.style.width = rect.width + 'px';
            canvas.style.height = rect.height + 'px';
        }
        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();

        // ─── Apply Config ──────────────────────────────────────────
        function applyConfig(cfg) {
            config = { ...config, ...cfg };

            document.body.style.background = config.backgroundColor;
            gameNameEl.textContent = config.theme?.gameName || 'CRASH PREVIEW';

            // Background image
            if (config.backgroundImage) {
                bgImage.src = config.backgroundImage;
                bgImage.style.display = 'block';
            } else {
                bgImage.style.display = 'none';
            }

            // Preload flying object image if it's an image URL/base64
            if (config.flyingObject && (config.flyingObject.startsWith('data:image') || config.flyingObject.startsWith('http'))) {
                const img = new Image();
                img.src = config.flyingObject;
                img.onload = () => { flyingObjectImg = img; };
            } else {
                flyingObjectImg = null;
            }

            // Preload crash image
            if (config.crashImage) {
                const img = new Image();
                img.src = config.crashImage;
                img.onload = () => { crashImageObj = img; };
            } else {
                crashImageObj = null;
            }

            // Update multiplier color
            multValue.style.color = config.graphColor;
            multLabel.style.color = config.graphColor;

            // Redraw idle state
            if (state === 'IDLE') {
                drawGraph(0, 1.0, false);
            }
        }

        // ─── Draw Graph ────────────────────────────────────────────
        function drawGraph(timeElapsedSec, currentMult, isCrashed) {
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            
            ctx.clearRect(0, 0, w, h);

            const padding = 40;
            const maxTime = Math.max(10, timeElapsedSec * 1.25);
            const maxMult = Math.max(2.0, currentMult * 1.25);

            // Grid lines
            ctx.strokeStyle = 'rgba(255,255,255,0.04)';
            ctx.lineWidth = 1;
            ctx.beginPath();
            for (let i = 1; i <= 5; i++) {
                const y = h - padding - (i / 5) * (h - padding * 2);
                ctx.moveTo(padding, y);
                ctx.lineTo(w - padding, y);
            }
            for (let i = 1; i <= 5; i++) {
                const x = padding + (i / 5) * (w - padding * 2);
                ctx.moveTo(x, padding);
                ctx.lineTo(x, h - padding);
            }
            ctx.stroke();

            // Labels
            ctx.fillStyle = 'rgba(255,255,255,0.25)';
            ctx.font = '11px monospace';
            ctx.textAlign = 'left';
            ctx.textBaseline = 'middle';
            ctx.fillText(maxMult.toFixed(1) + 'x', 5, padding);
            ctx.fillText('1.0x', 5, h - padding);

            // Bottom time labels
            ctx.textAlign = 'center';
            ctx.textBaseline = 'top';
            for (let i = 0; i <= 4; i++) {
                const t = (i / 4) * maxTime;
                const x = padding + (i / 4) * (w - padding * 2);
                ctx.fillText(t.toFixed(0) + 's', x, h - padding + 8);
            }

            if (timeElapsedSec <= 0 && !isCrashed) return;

            // Draw the curve path
            ctx.beginPath();
            ctx.moveTo(padding, h - padding);

            const STEPS = Math.max(120, Math.floor(timeElapsedSec * 40));
            let lastX = padding;
            let lastY = h - padding;

            for (let i = 0; i <= STEPS; i++) {
                const t = (i / STEPS) * timeElapsedSec;
                const m = Math.pow(Math.E, config.accelerationCurve * t);

                const x = padding + (t / maxTime) * (w - padding * 2);
                const y = h - padding - ((m - 1) / (maxMult - 1)) * (h - padding * 2);

                ctx.lineTo(x, y);
                lastX = x;
                lastY = y;
            }

            // Stroke the line
            ctx.strokeStyle = isCrashed ? '#ef4444' : config.graphColor;
            ctx.lineWidth = 4;
            ctx.lineJoin = 'round';
            ctx.lineCap = 'round';
            ctx.stroke();

            // Fill area under curve
            ctx.lineTo(lastX, h - padding);
            ctx.lineTo(padding, h - padding);
            ctx.closePath();

            const fillColor = isCrashed ? 'rgba(239, 68, 68, 0.08)' : hexToRGBA(config.graphColor, 0.12);
            ctx.fillStyle = fillColor;
            ctx.fill();

            // Glow effect on the line tip
            if (!isCrashed) {
                ctx.save();
                ctx.beginPath();
                ctx.arc(lastX, lastY, 8, 0, Math.PI * 2);
                ctx.fillStyle = config.graphColor;
                ctx.shadowColor = config.graphColor;
                ctx.shadowBlur = 20;
                ctx.fill();
                ctx.restore();
            }

            // Draw flying object or crash
            if (isCrashed) {
                if (crashImageObj) {
                    const imgW = 80;
                    const imgH = 80;
                    ctx.drawImage(crashImageObj, lastX - imgW / 2, lastY - imgH / 2, imgW, imgH);
                } else {
                    ctx.fillStyle = '#ef4444';
                    ctx.font = '36px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText('💥', lastX, lastY);
                }
            } else {
                ctx.save();
                ctx.translate(lastX, lastY);

                if (flyingObjectImg) {
                    // Calculate angle for rotation
                    const dt = 0.01;
                    const m1 = Math.pow(Math.E, config.accelerationCurve * timeElapsedSec);
                    const m2 = Math.pow(Math.E, config.accelerationCurve * (timeElapsedSec + dt));
                    const dx = (dt / maxTime) * (w - padding * 2);
                    const dy = -((m2 - m1) / (maxMult - 1)) * (h - padding * 2);
                    const angle = Math.atan2(dy, dx);
                    
                    ctx.rotate(angle);
                    ctx.shadowColor = config.graphColor;
                    ctx.shadowBlur = 25;
                    const imgW = 64;
                    const imgH = 64;
                    ctx.drawImage(flyingObjectImg, -imgW / 2, -imgH / 2, imgW, imgH);
                } else {
                    // Emoji
                    ctx.shadowColor = config.graphColor;
                    ctx.shadowBlur = 15;
                    ctx.font = '32px Arial';
                    ctx.textAlign = 'center';
                    ctx.textBaseline = 'middle';
                    ctx.fillText(config.flyingObject || '🚀', 0, 0);
                }
                ctx.restore();
            }
        }

        function hexToRGBA(hex, alpha) {
            const r = parseInt(hex.slice(1, 3), 16);
            const g = parseInt(hex.slice(3, 5), 16);
            const b = parseInt(hex.slice(5, 7), 16);
            return `rgba(${r}, ${g}, ${b}, ${alpha})`;
        }

        // ─── Generate Crash Point ──────────────────────────────────
        function generateCrashPoint() {
            const houseEdgeFactor = 1 - (config.houseEdge / 100);
            const e = 100 / (Math.random() * 100 + 1);
            const cp = Math.max(1.00, e * houseEdgeFactor);
            return Math.min(cp, config.maxMultiplier);
        }

        // ─── Game Loop ─────────────────────────────────────────────
        function startDemo() {
            if (state === 'PLAYING') return;

            crashPoint = generateCrashPoint();
            state = 'PLAYING';
            multiplier = 1.00;
            timeStart = performance.now();

            container.className = 'playing-state';
            multLabel.textContent = 'RISING...';

            if (animFrame) cancelAnimationFrame(animFrame);
            animFrame = requestAnimationFrame(updateGame);
        }

        function updateGame(time) {
            if (state !== 'PLAYING') return;

            const timeElapsedSec = (time - timeStart) / 1000;
            const nextMult = Math.pow(Math.E, config.accelerationCurve * timeElapsedSec);

            if (nextMult >= crashPoint) {
                multiplier = crashPoint;
                state = 'CRASHED';
                container.className = 'crashed-state';
                multValue.textContent = crashPoint.toFixed(2) + 'x';
                multLabel.textContent = 'CRASHED!';
                drawGraph(timeElapsedSec, crashPoint, true);

                // Send result back
                window.parent.postMessage({
                    type: 'CRASH_RESULT',
                    crashed: true,
                    crashPoint: crashPoint,
                    multiplier: crashPoint
                }, '*');

                // Auto-restart demo after delay
                setTimeout(() => {
                    if (state === 'CRASHED') {
                        reset();
                    }
                }, 2500);
                return;
            }

            multiplier = nextMult;
            multValue.textContent = nextMult.toFixed(2) + 'x';
            drawGraph(timeElapsedSec, nextMult, false);

            animFrame = requestAnimationFrame(updateGame);
        }

        function reset() {
            if (animFrame) cancelAnimationFrame(animFrame);
            state = 'IDLE';
            multiplier = 1.00;
            container.className = 'idle-state';
            multValue.textContent = '1.00x';
            multLabel.textContent = 'Waiting...';
            const w = canvas.width / window.devicePixelRatio;
            const h = canvas.height / window.devicePixelRatio;
            ctx.clearRect(0, 0, w, h);
            drawGraph(0, 1.0, false);
        }

        // ─── Message Handling ──────────────────────────────────────
        window.addEventListener('message', function(event) {
            if (!event.data || typeof event.data !== 'object') return;

            switch (event.data.type) {
                case 'CRASH_CONFIG':
                    applyConfig(event.data.config);
                    break;
                case 'START_DEMO':
                    startDemo();
                    break;
                case 'RESET':
                    reset();
                    break;
            }
        });

        // Notify parent that engine is ready
        setTimeout(() => {
            drawGraph(0, 1.0, false);
            window.parent.postMessage({ type: 'GAME_READY', engine: 'crash' }, '*');
        }, 200);
    })();
    </script>
</body>
</html>
